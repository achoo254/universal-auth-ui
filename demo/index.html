<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>universal-auth-ui Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    h1 { border-bottom: 1px solid #ddd; padding-bottom: 0.5rem; }
    h2 { margin-top: 2rem; color: #333; }
    section { margin: 1rem 0; }
    pre { background: #f5f5f5; padding: 1rem; border-radius: 4px; overflow-x: auto; max-height: 300px; }
  </style>
</head>
<body>
  <h1>universal-auth-ui Demo</h1>

  <h2>Single Buttons</h2>
  <section>
    <auth-button provider="google"></auth-button>
    <auth-button provider="github" theme="dark"></auth-button>
    <auth-button provider="microsoft"></auth-button>
  </section>

  <h2>Group (Vertical)</h2>
  <section>
    <auth-group providers="google,github,microsoft"></auth-group>
  </section>

  <h2>Group (Horizontal, Dark)</h2>
  <section>
    <auth-group providers="google,github" layout="horizontal" theme="dark"></auth-group>
  </section>

  <h2>With Server URL</h2>
  <section>
    <auth-button provider="google" server-url="https://httpbin.org/post"></auth-button>
  </section>

  <h2>Sizes</h2>
  <section>
    <auth-button provider="google" size="small"></auth-button>
    <auth-button provider="google" size="medium"></auth-button>
    <auth-button provider="google" size="large"></auth-button>
  </section>

  <h2>Custom Label</h2>
  <section>
    <auth-button provider="google" label="Continue with Google"></auth-button>
  </section>

  <h2>Event Log</h2>
  <pre id="log">Waiting for auth events...</pre>

  <script type="module">
    import '../dist/index.mjs';

    const log = document.getElementById('log');
    function appendLog(type, detail) {
      const entry = `[${type}] ${JSON.stringify(detail, null, 2)}`;
      log.textContent = entry + '\n\n' + log.textContent;
    }

    document.addEventListener('auth-success', (e) => appendLog('auth-success', e.detail));
    document.addEventListener('auth-error', (e) => appendLog('auth-error', e.detail));
    document.addEventListener('server-response', (e) => appendLog('server-response', e.detail));
  </script>
</body>
</html>
